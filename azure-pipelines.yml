trigger:
  branches:
    include:
      - main

# =========================
# ENVIRONMENT PARAMETER
# =========================
parameters:
- name: environment
  type: string
  default: dev
  values:
    - dev
    - uat
    - prod

# =========================
# VARIABLES
# =========================
variables:
  acrName: nodeacrshared12345
  imageName: node-app
  imageTag: $(Build.BuildId)

# =========================
# BUILD STAGE
# =========================
stages:

- stage: BuildAndPush
  displayName: Build and Push Docker Image
  jobs:
    - job: Build
      displayName: Build Image
      pool:
        name: Default   # your self-hosted agent pool

      steps:

        - script: |
            echo "Building for environment: ${{ parameters.environment }}"
            echo "Repo structure:"
            ls -R
          displayName: Debug Repo

        - task: Docker@2
          displayName: Login to ACR
          inputs:
            command: login
            containerRegistry: uat-service-connection

        - task: Docker@2
          displayName: Build and Push Image
          inputs:
            command: buildAndPush
            repository: $(imageName)
            dockerfile: app/Dockerfile
            buildContext: app
            containerRegistry: uat-service-connection
            tags: |
              latest
              $(imageTag)

# =========================
# DEPLOY STAGE (DEV)
# =========================
- stage: Deploy_DEV
  displayName: Deploy to DEV
  dependsOn: BuildAndPush
  condition: eq('${{ parameters.environment }}', 'dev')

  jobs:
    - job: DeployDev
      pool:
        name: Default
      steps:

        - script: |
            echo "Deploying to DEV environment"

            docker pull $(acrName).azurecr.io/$(imageName):latest

            docker rm -f nodeapp || true

            docker run -d \
              --name nodeapp \
              -p 3000:3000 \
              --restart unless-stopped \
              $(acrName).azurecr.io/$(imageName):latest

          displayName: Deploy DEV

# =========================
# DEPLOY STAGE (UAT)
# =========================
- stage: Deploy_UAT
  displayName: Deploy to UAT
  dependsOn: BuildAndPush
  condition: eq('${{ parameters.environment }}', 'uat')

  jobs:
    - job: DeployUAT
      pool:
        name: Default
      steps:

        - script: |
            echo "Deploying to UAT environment"

            docker pull $(acrName).azurecr.io/$(imageName):latest

            docker rm -f nodeapp || true

            docker run -d \
              --name nodeapp \
              -p 3000:3000 \
              --restart unless-stopped \
              $(acrName).azurecr.io/$(imageName):latest

          displayName: Deploy UAT

# =========================
# DEPLOY STAGE (PROD)
# =========================
- stage: Deploy_PROD
  displayName: Deploy to PROD
  dependsOn: BuildAndPush
  condition: eq('${{ parameters.environment }}', 'prod')

  jobs:
    - job: DeployPROD
      pool:
        name: Default
      steps:

        - script: |
            echo "Deploying to PROD environment"

            docker pull $(acrName).azurecr.io/$(imageName):latest

            docker rm -f nodeapp || true

            docker run -d \
              --name nodeapp \
              -p 3000:3000 \
              --restart unless-stopped \
              $(acrName).azurecr.io/$(imageName):latest

          displayName: Deploy PROD