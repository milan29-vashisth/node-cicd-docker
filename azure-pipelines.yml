trigger:
  branches:
    include:
      - main

pool:
  name: milan-self-hosted

variables:
  acrName: nodeacr12345
  imageName: node-app
  imageTag: $(Build.BuildId)

stages:

- stage: BuildAndPush
  displayName: Build and Push Docker Image
  jobs:
    - job: Build
      displayName: Docker Build and Push
      steps:

        - script: |
            echo "Repository Structure:"
            pwd
            ls -R
          displayName: Debug Repo Structure

        - task: Docker@2
          displayName: Build and Push Docker Image
          inputs:
            command: buildAndPush
            repository: $(imageName)
            dockerfile: app/Dockerfile
            buildContext: app
            containerRegistry: service-connection-spn
            tags: |
              latest
              $(imageTag)

- stage: Deploy
  displayName: Deploy to VM
  dependsOn: BuildAndPush
  jobs:
    - job: DeployToVM
      displayName: Deploy Container
      steps:

        - task: Docker@2
          displayName: Login to ACR
          inputs:
            command: login
            containerRegistry: service-connection-spn

        - script: |
            echo "Pulling latest image..."
            docker pull $(acrName).azurecr.io/$(imageName):latest

            echo "Stopping/removing named container if exists..."
            docker stop nodeapp || true
            docker rm nodeapp || true

            echo "Stopping any container using port 3000..."
            CONTAINER_ID=$(docker ps -q --filter "publish=3000")
            if [ ! -z "$CONTAINER_ID" ]; then
              docker stop $CONTAINER_ID || true
              docker rm $CONTAINER_ID || true
            fi

            echo "Killing any non-docker process using port 3000..."
            sudo fuser -k 3000/tcp || true

            echo "Pruning unused containers..."
            docker container prune -f

            echo "Starting new container..."
            docker run -d \
              --name nodeapp \
              -p 3000:3000 \
              --restart unless-stopped \
              $(acrName).azurecr.io/$(imageName):latest

            echo "Deployment complete."
          displayName: Deploy Container