trigger:
  branches:
    include:
      - main

pool:
  name: milan-self-hosted-dev   # FIXED

variables:
  acrName: nodeacrshared12345
  imageName: node-app
  imageTag: $(Build.BuildId)

stages:

# =========================
# BUILD + PUSH STAGE
# =========================
- stage: BuildAndPush
  displayName: Build and Push Docker Image
  jobs:
    - job: Build
      displayName: Docker Build and Push
      steps:

        - script: |
            echo "Repository Structure:"
            pwd
            ls -R
          displayName: Debug Repo Structure

        - task: Docker@2
          displayName: Build and Push Image to ACR
          inputs:
            command: buildAndPush
            repository: $(imageName)
            dockerfile: app/Dockerfile
            buildContext: app
            containerRegistry: uat-service-connection
            tags: |
              latest
              $(imageTag)

# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy
  displayName: Deploy to VM
  dependsOn: BuildAndPush
  jobs:
    - job: DeployToVM
      displayName: Deploy Container on VM
      steps:

        # IMPORTANT: login again in deploy stage (reliable on self-hosted agents)
        - script: |
            echo "Logging into ACR..."
            echo $(ACR_PASSWORD) | docker login $(acrName).azurecr.io \
              -u $(ACR_USERNAME) --password-stdin
          displayName: Docker Login to ACR

        - script: |
            echo "Pulling latest image..."
            docker pull $(acrName).azurecr.io/$(imageName):latest

            echo "Stopping existing container..."
            docker stop nodeapp || true
            docker rm nodeapp || true

            echo "Freeing port 3000..."
            sudo fuser -k 3000/tcp || true

            echo "Running new container..."
            docker run -d \
              --name nodeapp \
              -p 3000:3000 \
              --restart unless-stopped \
              $(acrName).azurecr.io/$(imageName):latest

            echo "Deployment complete."
          displayName: Deploy Container