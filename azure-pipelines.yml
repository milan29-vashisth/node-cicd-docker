trigger:
  branches:
    include:
      - main

pool:
  name: milan-self-hosted

variables:
  acrName: nodeacr12345
  imageName: node-app
  imageTag: $(Build.BuildId)

stages:

# =========================
# BUILD + PUSH
# =========================
- stage: BuildAndPush
  jobs:
    - job: DockerBuild
      steps:

        - task: Docker@2
          displayName: Build and Push Docker Image
          inputs:
            command: buildAndPush
            repository: $(imageName)
            dockerfile: app/Dockerfile
            containerRegistry: service-connection-spn
            tags: |
              latest
              $(imageTag)

# =========================
# DEPLOY
# =========================
- stage: Deploy
  dependsOn: BuildAndPush
  jobs:
    - job: DeployToVM
      steps:

        - script: |
            docker pull $(acrName).azurecr.io/$(imageName):latest

            docker stop nodeapp || true
            docker rm nodeapp || true

            docker run -d \
              --name nodeapp \
              -p 3000:3000 \
              $(acrName).azurecr.io/$(imageName):latest
          displayName: Deploy Container